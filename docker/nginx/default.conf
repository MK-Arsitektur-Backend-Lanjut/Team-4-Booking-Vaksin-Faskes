# Persistent connection pool to PHP-FPM. Without this, every request opens and
# tears down a fresh FastCGI connection to app:9000 (TIME_WAIT/port churn under load).
upstream php-fpm {
    server app:9000;
    keepalive 64;
}

server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/public;

    # Connection and buffer tuning for high concurrency
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Gzip compression for API JSON responses
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM process status for load-test monitoring: GET /fpm-status
    # (matches pm.status_path in docker/php/zz-www.conf).
    location = /fpm-status {
        access_log off;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass php-fpm;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-fpm;
        fastcgi_keep_conn on;
        # Fail fast under saturation instead of holding connections for the
        # default 60s (which piles up against the connection budget).
        fastcgi_connect_timeout 5s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 30s;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # FastCGI buffer and timeout tuning
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 60;
        fastcgi_read_timeout 60;
    }
}
