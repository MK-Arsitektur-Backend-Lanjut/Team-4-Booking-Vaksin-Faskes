; P0 capacity tuning for high-concurrency load tests.
;
; Overrides the stock php:8.3-fpm pool (pm=dynamic, pm.max_children=5), which
; caps the whole app at ~5 simultaneous PHP requests. This file is loaded last
; alphabetically (after www.conf and the image's zz-docker.conf), so its [www]
; directives merge into and win on the existing pool.
;
; Companion changes live in docker-compose.yml (MySQL), docker/nginx/default.conf
; (upstream keepalive) and .env (APP_DEBUG / log channel + cached config).
;
; pm=dynamic (not static) is used deliberately: it pre-warms 24 workers so the
; k6 ramp doesn't stall waiting for forks, and it avoids the static-mode config
; pitfalls while still capping the pool at 48.
[www]
pm = dynamic
pm.max_children = 48
pm.start_servers = 24
pm.min_spare_servers = 16
pm.max_spare_servers = 48
pm.max_requests = 1000
request_terminate_timeout = 30s
listen.backlog = 4096

; Exposed via nginx at GET /fpm-status for live monitoring during the load test.
pm.status_path = /fpm-status
