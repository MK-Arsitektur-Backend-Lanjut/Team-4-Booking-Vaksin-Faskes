[www]
user = www-data
group = www-data

listen = 9000

; Dynamic process management for variable load
pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20

; Recycle workers after 1000 requests to prevent memory leaks
pm.max_requests = 1000

; Slow log for debugging (requests taking > 5 seconds)
slowlog = /var/log/php-fpm-slow.log
request_slowlog_timeout = 5s

; Terminate requests that take too long (prevent worker starvation)
request_terminate_timeout = 60s

; Status page for monitoring (optional, useful during stress test)
pm.status_path = /fpm-status
