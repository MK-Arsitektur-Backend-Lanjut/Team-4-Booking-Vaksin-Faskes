services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faskes_app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    volumes:
      - ./:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: faskes_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: faskes_db
    restart: unless-stopped
    # P0 tuning passed as flags (mounted my.cnf is often ignored as
    # "world-writable" on Docker Desktop for Windows). 1073741824 = 1 GiB.
    command:
      - mysqld
      - --max-connections=500
      - --innodb-flush-log-at-trx-commit=2
      - --sync-binlog=0
      - --innodb-lock-wait-timeout=5
      - --innodb-buffer-pool-size=1073741824
      - --thread-cache-size=100
      - --back-log=512
    environment:
      MYSQL_DATABASE: faskes_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: faskes_user
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: