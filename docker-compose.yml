services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faskes_app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    volumes:
      - ./:/var/www
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/zz-custom.conf
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: faskes_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: faskes_db
    restart: unless-stopped
    # P0 tuning passed as flags (mounted my.cnf is often ignored as
    # "world-writable" on Docker Desktop for Windows). 1073741824 = 1 GiB.
    # High-concurrency values come from the queue module; the trailing flags
    # (log file size, O_DIRECT, table cache, IO threads, slow log) are kept
    # from main as complementary, non-conflicting optimizations.
    command:
      - mysqld
      - --max-connections=500
      - --innodb-flush-log-at-trx-commit=2
      - --sync-binlog=0
      - --innodb-lock-wait-timeout=5
      - --innodb-buffer-pool-size=1073741824
      - --thread-cache-size=100
      - --back-log=512
      - --innodb-log-file-size=128M
      - --innodb-flush-method=O_DIRECT
      - --table-open-cache=2000
      - --innodb-read-io-threads=4
      - --innodb-write-io-threads=4
      - --slow-query-log=1
      - --long-query-time=1
    environment:
      MYSQL_DATABASE: faskes_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: faskes_user
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: faskes_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:

